const TRACKED = ACTIVITIES.filter(a => !a.isExternal);
const FULL_WEEK_POINTS = TRACKED.reduce((s, a) => s + a.weeklyTarget * a.points, 0);
const ISTIKRAR_BONUS = 2; // her aktif güne +2 puan
const BONUS_START_DATE = "2026-06-29"; // bu tarihten (Pazartesi) itibaren başlayan haftalarda bonus puana katılır; öncesi bozulmaz
const MONTHS = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];

let DATA = { consultants: [], partnerships: [], closings: [], activities: [], yetkiler: [] };
let CURRENT_USER = null;
let CURRENT_TAB = null;
let SELECTED_LOGIN = null;

function getInitials(name) { return name.split(" ").map(n => n[0]).join("").slice(0,2).toUpperCase(); }
function fmtTL(n) { return "₺" + (n || 0).toLocaleString("tr-TR"); }
function daysSince(startDate) {
  if (!startDate) return null;
  const start = new Date(startDate + "T00:00:00");
  const diff = Math.floor((new Date() - start) / 86400000);
  return diff < 0 ? 0 : diff;
}
function tenureText(startDate) {
  const d = daysSince(startDate);
  if (d === null) return "";
  if (d < 60) return d + " gündür";
  return d + " gün (~" + Math.floor(d / 30) + " ay)";
}
function fmtTLshort(n) {
  if (!n) return "₺0";
  if (n >= 1000000) return "₺" + (n/1000000).toFixed(1) + "M";
  if (n >= 1000) return "₺" + Math.round(n/1000) + "K";
  return "₺" + n;
}

function getWeekStart(date) {
  const d = new Date(date || new Date());
  const day = d.getDay();
  const hour = d.getHours();
  let daysBack;
  if (day === 0) daysBack = 6;
  else daysBack = day - 1;
  d.setDate(d.getDate() - daysBack);
  d.setHours(0, 0, 0, 0);
  return d.toISOString();
}
function getWeekEnd(weekStart) { const d = new Date(weekStart); d.setDate(d.getDate() + 7); return d.toISOString(); }
function localDateStr(iso) { const d = new Date(iso); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function getPrevWeekStart(weekStart) { const d = new Date(weekStart); d.setDate(d.getDate() - 7); return d.toISOString(); }
function formatWeekRange(weekStart) {
  const d = new Date(weekStart);
  const end = new Date(d); end.setDate(end.getDate() + 6);
  const fmt = x => x.getDate() + " " + MONTHS[x.getMonth()];
  return fmt(d) + " – " + fmt(end);
}
function timeUntilFreeze(withSeconds) {
  const now = new Date();
  const day = now.getDay();
  const next = new Date(now);
  let daysAhead;
  if (day === 1) daysAhead = 7;        // Pazartesi: bugünün 00:00'ı geçti → sonraki Pzt
  else if (day === 0) daysAhead = 1;   // Pazar → yarın Pzt 00:00
  else daysAhead = 8 - day;            // Sal..Cmt → bu haftanın Pzt'sine kalan
  next.setDate(next.getDate() + daysAhead);
  next.setHours(0, 0, 0, 0);
  let diff = next - now;
  if (diff < 0) diff = 0;
  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const mins = Math.floor((diff%(1000*60*60))/(1000*60));
  if (!withSeconds) {
    if (days > 0) return days + " gün " + hours + " saat";
    return hours + " saat " + mins + " dk";
  }
  const secs = Math.floor((diff%(1000*60))/1000);
  const pad = n => String(n).padStart(2, '0');
  return (days > 0 ? days + " gün " : "") + pad(hours) + ":" + pad(mins) + ":" + pad(secs);
}

function getPartners(consultantId) {
  const p = DATA.partnerships.find(p => p.ids.includes(consultantId));
  return p ? p.ids.filter(id => id !== consultantId) : [];
}
function getConsultantName(id) { return (DATA.consultants.find(c => c.id === id) || {}).name || id; }
function getScoreBand(score) {
  if (score >= 80) return { name: "Hedefte", cls: "green" };
  if (score >= 50) return { name: "Yolda",   cls: "amber" };
  return                  { name: "Geride",  cls: "rose"  };
}

function computeWeekScore(consultantId, weekStart, weekEnd) {
  const wEntries = DATA.activities.filter(e => e.consultantId === consultantId && e.timestamp >= weekStart && e.timestamp < weekEnd);
  const wsDate = localDateStr(weekStart);
  const weDate = localDateStr(weekEnd);
  const wClosings = DATA.closings.filter(c => c.consultantId === consultantId && c.date >= wsDate && c.date < weDate);
  const counts = {};
  let points = 0;
  TRACKED.forEach(a => {
    counts[a.id] = wEntries.filter(e => e.type === a.id).length;
    points += counts[a.id] * a.points;
  });
  counts.kapanis = wClosings.length;
  const closingPoints = wClosings.reduce((s, c) => s + 40, 0); // her ortağa tam 40 (para bölünür, puan bölünmez)
  const notes = {};
  wEntries.forEach(e => { if (e.note) { (notes[e.type] = notes[e.type] || []).push(e.note); } });
  const daySet = new Set(wEntries.map(e => localDateStr(e.timestamp)));
  const activeDays = daySet.size;
  const bonus = activeDays * ISTIKRAR_BONUS;
  const bonusCounts = localDateStr(weekStart) >= BONUS_START_DATE;
  const activeToday = daySet.has(localDateStr(new Date().toISOString()));
  const totalPoints = points + (bonusCounts ? bonus : 0) + closingPoints;
  const performanceScore = Math.min(100, Math.round((points / FULL_WEEK_POINTS) * 100));
  return { counts, points, bonus, bonusCounts, activeDays, activeToday, closingPoints, totalPoints, performanceScore, weekClosings: wClosings, notes };
}

function avatarContent(consultant) {

function onConsultantSelect(consultantId) {
  const detail = document.getElementById('login-detail');
  if (!consultantId) {
    detail.innerHTML = '';
    SELECTED_LOGIN = null;
    return;
  }
  const c = DATA.consultants.find(x => x.id === consultantId);
  if (!c) return;
  SELECTED_LOGIN = consultantId;

  detail.innerHTML = `
    <div id="error-box"></div>
    <input type="tel" inputmode="numeric" pattern="[0-9]*" id="password-input" class="password-input" placeholder="••••" maxlength="6" autocomplete="off" />
    <button class="login-confirm-btn" onclick="tryLogin()">Giriş Yap</button>
  `;
  setTimeout(() => {
    const pi = document.getElementById('password-input');
    if (pi) {
      pi.focus();
      pi.addEventListener('keypress', (e) => { if (e.key === 'Enter') tryLogin(); });
    }
  }, 100);
}

function tryLogin() {
  if (!SELECTED_LOGIN) return;
  const passInput = document.getElementById('password-input');
  const password = passInput.value.trim();
  if (!password) return;
  const errBox = document.getElementById('error-box');
  errBox.innerHTML = '';
  apiGet('login', {id: SELECTED_LOGIN, pw: password})
    .then(function(res) {
      if (res && res.success) {
        var user = DATA.consultants.find(function(c) { return c.id === res.consultantId; });
        if (user) {
          CURRENT_USER = user;
          try { localStorage.setItem('current_user_id', user.id); } catch (e) {}
          showDashboard();
        }
      } else {
        errBox.innerHTML = '<div class="password-error">' + (res.error || 'Hatalı şifre') + '</div>';
        passInput.value = '';
        passInput.focus();
      }
    })
    .catch(function(err) { errBox.innerHTML = '<div class="password-error">Bağlantı hatası</div>'; });
}

function brokerLogin() {
  const password = prompt("Broker şifresi:");
  if (password === null || !password) return;
  apiGet('login', {id: 'umut', pw: password})
    .then(function(res) {
      if (res && res.success && res.isAdmin) {
        var user = DATA.consultants.find(function(c) { return c.id === res.consultantId; });
        if (user) {
          CURRENT_USER = user;
          try { localStorage.setItem('current_user_id', user.id); } catch (e) {}
          showDashboard();
        }
      } else { alert("Hatalı şifre."); }
    })
    .catch(function(err) { alert("Bağlantı hatası"); });
}

function karneInner(c) {
  const done = TRACKED.filter(a => (c.counts[a.id] || 0) > 0);
  let acts;
  if (done.length) {
    acts = '<div class="kb-alist">' + done.map(a => {
      const cnt = c.counts[a.id];
      const row = '<div class="kb-arow" style="background:' + a.lightBg + '">' +
        '<div class="kb-aic" style="background:' + a.color + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' + a.iconSvg + '</svg></div>' +
        '<div class="kb-anm">' + a.label + '</div>' +
        '<div class="kb-act" style="color:' + a.textColor + '">×' + cnt + '</div>' +
        '<div class="kb-apt" style="color:' + a.textColor + '">' + (cnt * a.points) + 'p</div>' +
        '</div>';
      const ns = (c.notes && c.notes[a.id]) ? c.notes[a.id] : [];
      const notesHtml = ns.length ? '<div class="kb-anotes">' + ns.map(n => '<div class="kb-anote">' + escapeHtml(n) + '</div>').join('') + '</div>' : '';
      return '<div class="kb-agroup">' + row + notesHtml + '</div>';
    }).join('') + '</div>';
  } else {
    acts = '<div class="kb-empty">Bu dönem aktivite girişi yok</div>';
  }
  let closings = '';
  const kl = c.weekClosings || [];
  if (kl.length) {
    closings = '<div class="kb-close"><div class="kb-sec-title">Kapanışlar · ' + kl.length + '</div>' + kl.map(k => {
      const pts = 40;
      const adr = String(k.adres || '').split(',')[0].trim().slice(0, 30);
      const d = k.date.slice(8, 10) + '.' + k.date.slice(5, 7);
      return '<div class="kb-crow"><div class="kb-cic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/><path d="M4 22h16"/></svg></div><div class="kb-cmain"><div class="kb-ctitle">' + k.tur + (adr ? ' · ' + adr : '') + '</div><div class="kb-csub">' + d + (k.isShared ? ' · ortak (' + k.shareCount + ' kişi)' : '') + '</div></div><div class="kb-cpts">+' + pts + 'p</div></div>';
    }).join('') + '</div>';
  }
  const flame = '<svg viewBox="0 0 24 24" width="13" height="13"><path fill="#f97316" d="M12 2c.7 2.4 2.3 3.3 3.5 4.8C16.7 8.2 17 9.6 17 11a5 5 0 1 1-10 0c0-1.6.6-2.8 1.5-3.8.2 1 .8 1.6 1.5 1.6.9 0 1.2-.9 1-2.2C11.7 5.2 11.5 3.6 12 2z"/></svg>';
  const streak = c.activeDays ? '<div class="kb-streak">' + flame + (c.activeDays) + ' aktif gün</div>' : '';
  const istikrarChip = c.bonusCounts ? '<div class="kb-chip green"><span>İstikrar</span><b>+' + (c.bonus || 0) + 'p</b></div>' : '';
  return '<div class="kb-top2"><div class="kb-total"><b>' + c.totalPoints + '</b><span>TOPLAM PUAN</span></div>' + streak + '</div>' +
    '<div class="kb-chips"><div class="kb-chip"><span>Aktivite</span><b>' + c.points + 'p</b></div>' +
    istikrarChip +
    '<div class="kb-chip red"><span>Kapanış</span><b>' + c.closingPoints + 'p</b></div></div>' +
    '<div class="kb-sec-title" style="margin-top:14px">Aktivite Dökümü</div>' + acts + closings;
}

function renderConsultantRanking() {
  const thisWeekStart = getWeekStart();
  const weekStart = getPrevWeekStart(thisWeekStart);
  const weekEnd = thisWeekStart;
  const ranks = DATA.consultants.filter(c => !c.isAdmin && !c.hiddenFromRanking).map(c => {
    const r = computeWeekScore(c.id, weekStart, weekEnd);
    return Object.assign({}, c, r);
  });
  const hasData = ranks.some(r => r.totalPoints > 0);
  if (hasData) ranks.sort((a, b) => b.totalPoints - a.totalPoints || a.name.localeCompare(b.name, 'tr'));
  else ranks.sort((a, b) => a.name.localeCompare(b.name, 'tr'));
  const rangeLabel = formatWeekRange(weekStart);

  let html = `<div class="podium-wrap"><div class="podium-head"><div class="podium-title">🏆 Geçen Haftanın Şampiyonları</div><div class="podium-week">${rangeLabel}</div></div>`;

  if (!hasData) {
    html += `<div class="podium-empty">Geçen hafta için kayıt bulunmuyor.</div></div>`;
    return html;
  }

  const top = ranks.slice(0, 3);
  const rest = ranks.slice(3);
  const medals = ['🥇', '🥈', '🥉'];
  const rings = ['ring-gold', 'ring-silver', 'ring-bronze'];

  const detailBlock = (c) => karneDetail(c);

  const c1 = top[0];
  html += `<div class="champ-card podium-tap" onclick="toggleDetail('${c1.id}')"><div class="champ-crown">👑</div><div class="champ-photo ring-gold" style="${avatarStyle(c1)}">${avatarContent(c1)}<div class="champ-medal">🥇</div></div><div class="champ-name">${c1.name}${c1.id === CURRENT_USER.id ? ' <span class="me-tag">SEN</span>' : ''}</div><div class="champ-pts">${c1.totalPoints}<span> puan</span></div><div class="champ-sub">${c1.counts.kapanis > 0 ? c1.counts.kapanis + ' kapanış · ' : ''}Haftanın Birincisi · detay için dokun</div></div>`;
  html += detailBlock(c1);

  if (top.length > 1) {
    html += `<div class="podium-2nd3rd">`;
    for (let i = 1; i < top.length; i++) {
      const c = top[i];
      html += `<div class="runner-card podium-tap" onclick="toggleDetail('${c.id}')"><div class="runner-photo ${rings[i]}" style="${avatarStyle(c)}">${avatarContent(c)}<div class="runner-medal">${medals[i]}</div></div><div class="runner-name">${c.name}${c.id === CURRENT_USER.id ? ' <span class="me-tag">SEN</span>' : ''}</div><div class="runner-pts">${c.totalPoints} p</div></div>`;
    }
    html += `</div>`;
    for (let i = 1; i < top.length; i++) html += detailBlock(top[i]);
  }

  if (rest.length) {
    html += `<div class="podium-list">`;
    rest.forEach((c, idx) => {
      const isMe = c.id === CURRENT_USER.id;
      html += `<div class="plist-row podium-tap ${isMe ? 'me' : ''}" onclick="toggleDetail('${c.id}')"><div class="plist-num">${idx + 4}</div><div class="plist-av" style="${avatarStyle(c)}">${avatarContent(c)}</div><div class="plist-name">${c.name}${isMe ? '<span class="me-tag">SEN</span>' : ''}</div><div class="plist-pts">${c.totalPoints}<span> p</span></div></div>`;
      html += detailBlock(c);
    });
    html += `</div>`;
  }

  html += `<div class="rank-footer-note">Geçen haftanın kesinleşmiş sonuçları · isme dokun, dökümü gör</div></div>`;
  return html;
}

function renderAllTimeRanking() {
  const start = '2026-01-01T00:00:00';
  const end = new Date(); end.setHours(23, 59, 59, 999);
  const ranks = DATA.consultants.filter(c => !c.isAdmin && !c.hiddenFromRanking).map(c => {
    const r = computeWeekScore(c.id, start, end.toISOString());
    const cl = DATA.closings.filter(x => x.consultantId === c.id && x.date >= '2026-01-01').length;
    return Object.assign({}, c, r, { cl2026: cl });
  });
  const hasData = ranks.some(r => r.totalPoints > 0);
  ranks.sort((a, b) => b.totalPoints - a.totalPoints || a.name.localeCompare(b.name, 'tr'));
  const maxPoints = Math.max(1, ...ranks.map(r => r.totalPoints || 0));
  const now = new Date();
  const rangeLabel = '1 Oca 2026 – ' + now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();

  let html = `<div class="alltime-head"><div class="podium-title">📊 2026 Puan Klasmanı</div><div class="podium-week">${rangeLabel} · toplam üretim puanı</div></div><div class="rank-card">`;
  ranks.forEach((c, idx) => {
    const pts = c.totalPoints || 0;
    const barPct = (pts / maxPoints) * 100;
    let badgeCls = 'rank-other';
    if (hasData && idx === 0) badgeCls = 'rank-1';
    else if (hasData && idx === 1) badgeCls = 'rank-2';
    else if (hasData && idx === 2) badgeCls = 'rank-3';
    const badge = (hasData && idx === 0) ? '🥇' : (hasData && idx === 1) ? '🥈' : (hasData && idx === 2) ? '🥉' : (idx + 1);
    const barCls = (hasData && idx === 0) ? 'bar-gold' : 'bar-default';
    const mini = TRACKED.map(a => {
      const cnt = c.counts[a.id] || 0;
      return '<div class="detail-mini"><div class="detail-mini-icon" style="background:' + a.color + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' + a.iconSvg + '</svg></div><div class="detail-mini-count">' + cnt + '</div><div class="detail-mini-target">' + a.short + '</div></div>';
    }).join('');
    const totalAct = TRACKED.reduce((s, a) => s + (c.counts[a.id] || 0), 0);
    html += `<div class="rank-row podium-tap" onclick="toggleDetail('${c.id}')"><div class="rank-badge ${badgeCls}">${badge}</div><div class="alltime-av" style="${avatarStyle(c)}">${avatarContent(c)}</div><div class="rank-info"><div class="rank-row-top"><div class="rank-name">${c.name}</div><div class="rank-points">${pts}<span style="font-size:11px;color:#a8a29e;font-weight:600"> p</span></div></div><div class="rank-bar-bg">${pts > 0 ? '<div class="rank-bar ' + barCls + '" style="width:' + barPct + '%"></div>' : ''}</div><div class="alltime-sub">${c.cl2026} kapanış · ${c.points} aktivite + ${c.closingPoints} kapanış puanı</div></div></div>`;

  });

  return html;

function renderAdminLive() {
  const weekStart = getWeekStart();
  const weekEnd = getWeekEnd(weekStart);
  const stats = DATA.consultants.filter(c => !c.isAdmin && !c.hiddenFromRanking).map(c => {
    const r = computeWeekScore(c.id, weekStart, weekEnd);
    const all = DATA.closings.filter(cl => cl.consultantId === c.id);
    const allBrut = all.reduce((s, x) => s + (x.toplamHB || 0), 0);
    const allPay = all.reduce((s, x) => s + x.amount, 0);
    return Object.assign({}, c, r, { allClosings: all, allBrut: allBrut, allPay: allPay });
  });
  const allZero = stats.every(s => s.totalPoints === 0);
  if (allZero) stats.sort((a, b) => a.name.localeCompare(b.name, 'tr'));
  else stats.sort((a, b) => b.totalPoints - a.totalPoints || a.name.localeCompare(b.name, 'tr'));
  const totalPoints = stats.reduce((s, c) => s + c.totalPoints, 0);
  const totalClosings = Math.round(stats.reduce((s, c) => s + c.weekClosings.reduce((a, x) => a + 1 / (x.shareCount || 1), 0), 0));
  const activeCount = stats.filter(c => c.totalPoints > 0).length;
  let html = `<div class="stats-grid"><div class="stat-card"><div class="stat-label">Ekip puanı</div><div class="stat-value">${totalPoints}</div><div class="stat-unit">bu hafta</div></div><div class="stat-card"><div class="stat-label">Aktif</div><div class="stat-value">${activeCount}/${stats.length}</div><div class="stat-unit">danışman</div></div><div class="stat-card"><div class="stat-label">Kapanış</div><div class="stat-value">${totalClosings}</div><div class="stat-unit">bu hafta</div></div></div><div class="info-bar-amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg><div><div style="font-weight:600">Canlı tablo · ${formatWeekRange(weekStart)}</div><div>Pazartesi 00:00'da dondurulacak (<span class="freeze-countdown">${timeUntilFreeze(true)}</span>).</div></div></div><div class="rank-card"><div class="rank-header"><div class="rank-title">Ekip Performansı (Canlı)</div>${allZero ? '<div style="font-size:10px;background:#f5f5f4;padding:2px 8px;border-radius:4px;color:#78716c;font-weight:500">alfabetik</div>' : ''}</div>`;
  stats.forEach((c, idx) => {
    const partners = getPartners(c.id);
    const band = getScoreBand(c.performanceScore);
    let badgeCls = 'rank-other';
    if (allZero) badgeCls = 'rank-none';
    else if (idx === 0) badgeCls = 'rank-1';
    else if (idx === 1) badgeCls = 'rank-2';
    else if (idx === 2) badgeCls = 'rank-3';
    const statsLine = TRACKED.map(a => {
      const cnt = c.counts[a.id];
      if (cnt === 0) return null;
      const done = cnt >= a.weeklyTarget;
      return '<span class="' + (done ? 'done' : '') + '">' + a.short + ':' + cnt + '</span>';
    }).filter(Boolean).join('');
    const closingsLine = c.weekClosings.length > 0 ? '<span class="closing">Kapanış:' + c.weekClosings.length + '</span>' : '';
    const emptyLine = c.totalPoints === 0 && c.allClosings.length === 0 ? '<span class="text-stone">aktivite yok</span>' : (c.totalPoints === 0 && c.allClosings.length > 0 ? '<span class="text-stone">' + c.allClosings.length + ' geçmiş kapanış</span>' : '');
    html += `<button class="admin-row" onclick="toggleDetail('${c.id}')"><div class="admin-rank-num ${badgeCls}">${allZero ? '·' : (idx + 1)}</div><div class="avatar" style="${avatarStyle(c)}">${avatarContent(c)}</div><div class="rank-info"><div class="rank-name">${c.name}<span class="score-dot ${band.cls}" style="display:inline-block;margin-left:6px"></span>${c.activeToday ? '<span class="today-badge on"><svg viewBox="0 0 24 24"><path fill="#f97316" d="M12 2c.7 2.4 2.3 3.3 3.5 4.8C16.7 8.2 17 9.6 17 11a5 5 0 1 1-10 0c0-1.6.6-2.8 1.5-3.8.2 1 .8 1.6 1.5 1.6.9 0 1.2-.9 1-2.2C11.7 5.2 11.5 3.6 12 2z"/></svg>bugün</span>' : '<span class="today-badge off">bugün yok</span>'}${partners.length > 0 ? '<span class="partner-badge">& ' + partners.map(p => getConsultantName(p).split(' ')[0]).join(', ') + '</span>' : ''}</div>${c.startDate ? '<div class="admin-tenure">' + daysSince(c.startDate) + ' gündür · net ' + fmtTLshort(c.allPay) + '</div>' : ''}<div class="admin-row-stats">${statsLine}${closingsLine}${emptyLine}</div></div><div style="text-align:right"><div class="rank-points">${c.totalPoints}</div><div class="rank-points-light">puan</div></div></button><div id="detail-${c.id}" class="kb-detail" style="display:none"><div class="kb-band ${band.cls}">${band.name} · ${c.performanceScore}/100</div>${karneInner(c)}<div class="closing-summary" style="margin-top:12px"><div class="closing-summary-top"><div class="closing-summary-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/></svg></div><div class="closing-summary-title">Doğuş Özeti</div><div class="closing-summary-count">${c.allClosings.length} işlem</div></div><div class="closing-3col"><div class="c-brut"><div class="label">Brüt HB</div><div class="value">${fmtTLshort(c.allBrut)}</div></div><div class="c-pay"><div class="label">Danışmana</div><div class="value">${fmtTLshort(c.allPay)}</div></div><div class="c-off"><div class="label">Ofise</div><div class="value">${fmtTLshort(c.allBrut - c.allPay)}</div></div></div></div></div>`;
  });
  html += '</div>';
  return html;
}

  if (hasData) stats.sort((a, b) => b.totalPoints - a.totalPoints || a.name.localeCompare(b.name, 'tr'));
  else stats.sort((a, b) => a.name.localeCompare(b.name, 'tr'));
  let html = '<div style="margin-bottom:12px;font-size:11px;color:#78716c">Donmuş hafta sonu sıralaması · ' + formatWeekRange(prevStart) + '</div>';
  if (!hasData) return html + '<div class="rank-card"><div style="padding:32px;text-align:center;font-size:14px;color:#78716c">Henüz tamamlanmış bir hafta yok.</div></div>';
  html += '<div class="rank-card">';
  stats.forEach((c, idx) => {
    let badgeCls = 'rank-other';
    if (idx === 0) badgeCls = 'rank-1';
    else if (idx === 1) badgeCls = 'rank-2';
    else if (idx === 2) badgeCls = 'rank-3';
    html += '<div class="rank-row"><div class="rank-badge ' + badgeCls + '">' + (idx + 1) + '</div><div class="rank-info"><div class="rank-row-top"><div class="rank-name">' + c.name + '</div><div class="rank-points">' + c.totalPoints + '<span class="rank-points-light"> p</span></div></div></div></div>';
  });
  html += '</div>';
  return html;
}

function escapeHtml(x){ return String(x==null?'':x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

var YETKI_LOADED = false;
function loadYetkiler() {
  apiGet('yetkiler')
    .then(function(res){ YETKI_LOADED = true; if (res && res.yetkiler) DATA.yetkiler = res.yetkiler; if (CURRENT_TAB === 'yetkiler') renderContent(); })
    .catch(function(){ YETKI_LOADED = true; if (CURRENT_TAB === 'yetkiler') renderContent(); });
}
function renderYetkiler() {
  if (!YETKI_LOADED) { loadYetkiler(); return '<div style="padding:44px 20px;text-align:center;color:#a8a29e;font-size:14px">Yükleniyor…</div>'; }
  var list = (DATA.yetkiler || []).slice().sort(function(a,b){ return String(b.timestamp).localeCompare(String(a.timestamp)); });
  if (!list.length) return '<div style="padding:44px 20px;text-align:center;color:#a8a29e;font-size:14px">Henüz alınan yetki kaydı yok.</div>';
  var lockSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
  var rows = list.map(function(y){
    var link = y.fileUrl ? '<a class="yk-link" href="' + y.fileUrl + '" target="_blank" rel="noopener">PDF ›</a>' : '';
    return '<div class="yk-row"><div class="yk-ic">' + lockSvg + '</div>' +
      '<div class="yk-main"><div class="yk-adi">' + escapeHtml(y.yetkiAdi || 'Yetki') + '</div>' +
      '<div class="yk-sub">' + escapeHtml(y.name || '') + ' · <span class="yk-date">' + escapeHtml(y.date || '') + '</span></div></div>' + link + '</div>';
  }).join('');
  return '<div style="padding:4px 2px 14px"><div class="kb-sec-title" style="margin:6px 2px 10px">ALINAN YETKİLER · ' + list.length + '</div>' + rows + '</div>';
}

function renderClosingsTab() {
  const unique = [];
  const seen = new Set();
  DATA.closings.forEach(c => {
    if (!seen.has(c.originalId)) {
      seen.add(c.originalId);
      const shares = DATA.closings.filter(x => x.originalId === c.originalId);
      unique.push(Object.assign({}, c, { _shares: shares, _totalShared: shares.reduce((s, x) => s + x.amount, 0) }));
    }
  });
  unique.sort((a, b) => b.date.localeCompare(a.date));
  const totalBrut = unique.reduce((s, c) => s + (c.toplamHB || 0), 0);
  const totalPay = unique.reduce((s, c) => s + c._totalShared, 0);
  let html = `<div class="sheets-bar"><div class="sheets-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></div><div style="flex:1"><div class="sheets-title">Google Sheets Bağlantısı <span class="sheets-status">Bağlı</span></div><div class="sheets-sub">Kapanış formu sheet'inden okunuyor</div><button class="sheets-sync-btn" onclick="syncClosings()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Şimdi Senkronize Et</button></div></div><div class="stats-grid"><div class="stat-card"><div class="stat-label">Brüt HB</div><div class="stat-value">${fmtTLshort(totalBrut)}</div><div class="stat-unit">toplam</div></div><div class="stat-card" style="background:#ecfdf5;border-color:#a7f3d0"><div class="stat-label" style="color:#047857">Danışmanlara</div><div class="stat-value" style="color:#047857">${fmtTLshort(totalPay)}</div><div class="stat-unit" style="color:#059669">net</div></div><div class="stat-card" style="background:#eff6ff;border-color:#bfdbfe"><div class="stat-label" style="color:#1d4ed8">Ofise</div><div class="stat-value" style="color:#1d4ed8">${fmtTLshort(totalBrut - totalPay)}</div><div class="stat-unit" style="color:#2563eb">kalan</div></div></div><div class="rank-card"><div class="rank-header"><div class="rank-title">Tüm Kapanışlar</div><div class="rank-week">${unique.length} işlem</div></div>`;
  unique.forEach(cl => {
    const isShared = cl.isShared;
    const partnerNames = isShared ? cl._shares.map(s => getConsultantName(s.consultantId).split(' ')[0]).filter(Boolean).join(' & ') : null;
    html += `<div class="closing-item"><div class="closing-item-top"><div style="flex:1;min-width:0"><div class="closing-item-name">${isShared ? partnerNames + '<span class="shared-tag ortak">Ortak</span>' : getConsultantName(cl.consultantId)}<span class="shared-tag ${cl.tur === 'Satılık' ? 'satilik' : 'kiralik'}">${cl.tur}</span></div><div class="closing-item-meta">${new Date(cl.date).toLocaleDateString('tr-TR')} · ${cl.adres}</div></div></div><div class="closing-item-row"><span class="pill brut">Brüt: <strong>${fmtTL(cl.toplamHB)}</strong></span><span class="pill pay">Danışman: <strong>${fmtTL(cl._totalShared)}</strong>${isShared ? ' (' + cl._shares.length + ' kişi × ' + fmtTL(cl.amount) + ')' : ''}</span></div></div>`;
  });
  html += '</div>';
  return html;
}

var NOTE_TYPE = null;
var NOTE_META = {
  egitim: { title: 'Eğitim', q: 'Hangi eğitimi aldınız?', ph: 'Eğitim adı' },
  gosterim: { title: 'Gösterim', q: 'Nereyi gösterdiniz?', ph: 'Adres / portföy' }
};
function openNoteModal(type) {
  NOTE_TYPE = type;
  var m = NOTE_META[type] || { title: 'Bilgi', q: 'Detay', ph: '' };
  document.getElementById('nm-title').textContent = m.title;
  document.getElementById('nm-q').textContent = m.q;
  var inp = document.getElementById('nm-text'); inp.value = ''; inp.placeholder = m.ph;
  var st = document.getElementById('nm-status'); st.textContent = ''; st.className = 'ymodal-status';
  var btn = document.getElementById('nm-save'); btn.disabled = false; btn.textContent = 'İlerle';
  document.getElementById('note-modal').style.display = 'flex';
  setTimeout(function(){ inp.focus(); }, 100);
}
function closeNoteModal() { document.getElementById('note-modal').style.display = 'none'; NOTE_TYPE = null; }
function saveNoteFromModal() {
  var note = document.getElementById('nm-text').value.trim();
  var st = document.getElementById('nm-status');
  if (!note) { st.className = 'ymodal-status err'; st.textContent = 'Lütfen bir cevap yazın.'; return; }
  var type = NOTE_TYPE;
  var entry = { id: 'tmp_' + Date.now() + '_' + Math.random(), consultantId: CURRENT_USER.id, type: type, timestamp: new Date().toISOString(), note: note };
  DATA.activities.push(entry);
  closeNoteModal();
  renderContent();
  showToast('Kaydedildi \u2713');
  apiPost({action:'addActivityWithNote', consultantId:CURRENT_USER.id, type:type, note:note})
    .then(function(res){ if (res && res.success) { entry.id = res.id; entry.timestamp = res.timestamp; } })
    .catch(function(){ DATA.activities = DATA.activities.filter(function(e){ return e.id !== entry.id; }); renderContent(); showToast('\u26a0\ufe0f Kayıt yapılamadı'); });
}

function openYetkiModal() {
  document.getElementById('ym-name').textContent = CURRENT_USER ? CURRENT_USER.name : '—';
  document.getElementById('ym-adi').value = '';
  document.getElementById('ym-file').value = '';
  var st = document.getElementById('ym-status'); st.textContent = ''; st.className = 'ymodal-status';
  var btn = document.getElementById('ym-save'); btn.disabled = false; btn.textContent = 'Kaydet';
  document.getElementById('yetki-modal').style.display = 'flex';
  setTimeout(function(){ document.getElementById('ym-adi').focus(); }, 100);
}
function closeYetkiModal() { document.getElementById('yetki-modal').style.display = 'none'; }
function saveYetkiFromModal() {
  var adi = document.getElementById('ym-adi').value.trim();
  var fileEl = document.getElementById('ym-file');
  var st = document.getElementById('ym-status');
  var file = fileEl.files && fileEl.files[0];
  if (!adi) { st.className = 'ymodal-status err'; st.textContent = 'Yetki adı / adres girin.'; return; }
  if (!file) { st.className = 'ymodal-status err'; st.textContent = 'PDF belgesi seçin.'; return; }
  if (file.type !== 'application/pdf') { st.className = 'ymodal-status err'; st.textContent = 'Sadece PDF yükleyebilirsiniz.'; return; }
  if (file.size > 15 * 1024 * 1024) { st.className = 'ymodal-status err'; st.textContent = 'Dosya 15 MB\'dan küçük olmalı.'; return; }
  var btn = document.getElementById('ym-save'); btn.disabled = true; btn.textContent = 'Yükleniyor\u2026';
  st.className = 'ymodal-status'; st.textContent = 'Belge yükleniyor, lütfen bekleyin\u2026';
  var reader = new FileReader();
  reader.onload = function() {
    var base64 = String(reader.result).split(',')[1];
    apiPost({action:'saveYetki', consultantId:CURRENT_USER.id, yetkiAdi:adi, fileName:file.name, base64Data:base64})
      .then(function(res) {
        if (res && res.success) {
          DATA.activities.push({ id: res.id, consultantId: CURRENT_USER.id, type: 'yetki', timestamp: res.timestamp });
          if (res.yetki) { DATA.yetkiler = DATA.yetkiler || []; DATA.yetkiler.unshift(res.yetki); }
          closeYetkiModal(); renderContent(); showToast('Yetki kaydedildi \u2713 (+15 puan)');
        } else {
          st.className = 'ymodal-status err'; st.textContent = '\u26a0\ufe0f ' + ((res && res.error) || 'Kayıt yapılamadı');
          btn.disabled = false; btn.textContent = 'Kaydet';
        }
      })
      .catch(function(err) {
        st.className = 'ymodal-status err'; st.textContent = '\u26a0\ufe0f Bağlantı hatası';
        btn.disabled = false; btn.textContent = 'Kaydet';
      });
  };
  reader.onerror = function() { st.className = 'ymodal-status err'; st.textContent = 'Dosya okunamadı.'; btn.disabled = false; btn.textContent = 'Kaydet'; };
  reader.readAsDataURL(file);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function addActivity(type) {
  if (type === 'yetki') { openYetkiModal(); return; }
  if (type === 'egitim' || type === 'gosterim') { openNoteModal(type); return; }
  const entry = { id: 'tmp_' + Date.now() + '_' + Math.random(), consultantId: CURRENT_USER.id, type: type, timestamp: new Date().toISOString() };
  DATA.activities.push(entry);
  renderContent();
  showToast('Kaydedildi ✓');
  apiPost({action:'addActivity', consultantId:CURRENT_USER.id, type:type})
    .then(function(res) { if (res && res.success) { entry.id = res.id; entry.timestamp = res.timestamp; } })
    .catch(function(err) { DATA.activities = DATA.activities.filter(function(e) { return e.id !== entry.id; }); renderContent(); showToast('⚠️ Kayıt yapılamadı'); });
}

function undoActivity(type) {
  const weekStart = getWeekStart();
  for (let i = DATA.activities.length - 1; i >= 0; i--) {
    const e = DATA.activities[i];
    if (e.consultantId === CURRENT_USER.id && e.type === type && e.timestamp >= weekStart) {
      DATA.activities.splice(i, 1);
      renderContent();
      showToast('Geri alındı');
      apiPost({action:'removeLastActivity', consultantId:CURRENT_USER.id, type:type, weekStart:weekStart});
      return;
    }
  }
}

function syncClosings() {
  showToast('Senkronize ediliyor…');
  apiGet('init')
    .then(function(res) { DATA.closings = res.closings; DATA.activities = res.activities; renderContent(); showToast('Güncellendi ✓'); })
    .catch(function(err) { showToast('⚠️ Hata'); });
}

// === CANLI OTOMATİK GÜNCELLEME ===
let POLL_TIMER = null;
let CLOCK_TIMER = null;
let LAST_SIG = '';
function dataSignature() { return DATA.activities.length + '|' + DATA.closings.length; }
function tickCountdown() {
  const nodes = document.querySelectorAll('.freeze-countdown');
  if (!nodes.length) return;
  const txt = timeUntilFreeze(true);
  nodes.forEach(n => { n.textContent = txt; });
}
function startPolling() {
  stopPolling();
  LAST_SIG = dataSignature();
  POLL_TIMER = setInterval(refreshLiveData, 25000);
  tickCountdown();
  CLOCK_TIMER = setInterval(tickCountdown, 1000);
}
function stopPolling() {
  if (POLL_TIMER) { clearInterval(POLL_TIMER); POLL_TIMER = null; }
  if (CLOCK_TIMER) { clearInterval(CLOCK_TIMER); CLOCK_TIMER = null; }
}
function refreshLiveData() {
  if (!CURRENT_USER || document.hidden) return;
  apiGet('live')
    .then(function(res) {
      if (!res) return;
      var pending = DATA.activities.filter(function(a) { return String(a.id).indexOf('tmp_') === 0; });
      DATA.activities = res.activities.concat(pending);
      DATA.closings = res.closings;
      var sig = dataSignature();
      if (sig !== LAST_SIG) { LAST_SIG = sig; renderContent(); }
    })
    .catch(function() {});
}

window.onload = function() {
  try {
    var initData = <?!= initData ?>;
    DATA = initData;
    document.getElementById('loading').classList.add('hidden');
    var savedId = null;
    try { savedId = localStorage.getItem('current_user_id'); } catch(e) {}
    if (savedId) {
      var user = DATA.consultants.find(function(c) { return c.id === savedId; });
      if (user) { CURRENT_USER = user; showDashboard(); return; }
    }
    renderLogin();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="color:#dc2626;padding:20px;text-align:center">Hata: ' + e.message + ' <button onclick="window.location.reload()" style="color:#dc2626;text-decoration:underline;border:none;background:none;cursor:pointer;font-size:14px">Tekrar dene</button></div>';
  }
};
</script>
